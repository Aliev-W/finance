# fly.toml - Fly.io konfiguratsiyasi
# "app" nomini o'zgartiring (fly launch vaqtida avtomatik belgilanadi)
app = "salary-manager-app"
primary_region = "sin"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DATA_DIR = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "salary_data"
  destination = "/data"
